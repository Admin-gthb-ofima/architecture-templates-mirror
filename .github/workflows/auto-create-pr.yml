name: Auto Create Mirror PR - dev to qa with Bugbot gate

on:
  push:
    branches:
      - 'dev'

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read
  issues: read

jobs:
  create-pr-and-wait-bugbot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh auth status

      - name: Check if PR already exists
        id: existing_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "dev" \
            --base "qa" \
            --state open \
            --json number \
            --jq '.[0].number')

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Create PR if it does not exist
        if: steps.existing_pr.outputs.pr_number == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --repo "${{ github.repository }}" \
            --head "dev" \
            --base "qa" \
            --title "[MIRROR] dev -> qa" \
            --body "PR espejo automático generado desde Azure DevOps. Esperando revisión de Bugbot antes del merge."

      - name: Resolve PR number
        id: pr_data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "dev" \
            --base "qa" \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "No se encontró una PR abierta dev -> qa"
            exit 1
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Wait for Bugbot evidence
        id: wait_bugbot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr_data.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          echo "Esperando evidencia de Bugbot en PR #$PR_NUMBER"

          MAX_ATTEMPTS=18
          SLEEP_SECONDS=20
          BUGBOT_FOUND="false"

          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "Intento $i de $MAX_ATTEMPTS"

            COMMENTS_JSON=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" || echo "[]")

            MATCH=$(echo "$COMMENTS_JSON" | jq -r '
              map(select(
                (.body | ascii_downcase | contains("cursor")) or
                (.body | ascii_downcase | contains("bugbot"))
              )) | length
            ')

            if [ "$MATCH" -gt 0 ]; then
              echo "Bugbot detectado por comentario"
              BUGBOT_FOUND="true"
              break
            fi

            echo "Bugbot aún no aparece. Esperando $SLEEP_SECONDS segundos..."
            sleep "$SLEEP_SECONDS"
          done

          echo "bugbot_found=$BUGBOT_FOUND" >> "$GITHUB_OUTPUT"

          if [ "$BUGBOT_FOUND" != "true" ]; then
            echo "Bugbot no dejó evidencia dentro del tiempo esperado."
            exit 1
          fi

      - name: Merge PR after Bugbot validation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr_data.outputs.pr_number }}
        run: |
          gh pr merge "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --merge \
            --delete-branch=false