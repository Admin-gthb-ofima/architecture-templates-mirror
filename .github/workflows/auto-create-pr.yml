name: Auto Create Mirror PR

on:
  push:
    branches:
      - 'feature/**'
      - 'dev'
      - 'qa'

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine base branch
        id: base
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          if [[ "$BRANCH" == feature/* ]]; then
            BASE="dev"
          elif [[ "$BRANCH" == "dev" ]]; then
            BASE="qa"
          elif [[ "$BRANCH" == "qa" ]]; then
            BASE="master"
          else
            exit 0
          fi

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "base=$BASE" >> "$GITHUB_OUTPUT"

      - name: Check if PR already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COUNT=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${{ steps.base.outputs.branch }}" \
            --base "${{ steps.base.outputs.base }}" \
            --state open \
            --json number \
            --jq 'length')

          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Create PR
        if: steps.check.outputs.count == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --repo "${{ github.repository }}" \
            --head "${{ steps.base.outputs.branch }}" \
            --base "${{ steps.base.outputs.base }}" \
            --title "[MIRROR] ${{ steps.base.outputs.branch }} -> ${{ steps.base.outputs.base }}" \
            --body "PR espejo automático generado desde Azure DevOps."