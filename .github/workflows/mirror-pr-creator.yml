name: mirror-pr-creator

on:
  push:
    branches:
      - 'feature/**'
      - 'dev'
      - 'qa'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve source and target branches
        id: branch_map
        run: |
          SOURCE_BRANCH="${GITHUB_REF_NAME}"
          TARGET_BRANCH=""

          if [[ "$SOURCE_BRANCH" == feature/* ]]; then
            TARGET_BRANCH="dev"
          elif [[ "$SOURCE_BRANCH" == "dev" ]]; then
            TARGET_BRANCH="qa"
          elif [[ "$SOURCE_BRANCH" == "qa" ]]; then
            TARGET_BRANCH="master"
          else
            echo "Rama no soportada: $SOURCE_BRANCH"
            exit 1
          fi

          echo "source_branch=$SOURCE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "target_branch=$TARGET_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Authenticate GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh auth status

      - name: Check if PR already exists
        id: existing_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_BRANCH: ${{ steps.branch_map.outputs.source_branch }}
          TARGET_BRANCH: ${{ steps.branch_map.outputs.target_branch }}
        run: |
          PR_NUMBER=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "$SOURCE_BRANCH" \
            --base "$TARGET_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number')

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Create PR if it does not exist
        if: steps.existing_pr.outputs.pr_number == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_BRANCH: ${{ steps.branch_map.outputs.source_branch }}
          TARGET_BRANCH: ${{ steps.branch_map.outputs.target_branch }}
        run: |
          gh pr create \
            --repo "${{ github.repository }}" \
            --head "$SOURCE_BRANCH" \
            --base "$TARGET_BRANCH" \
            --title "[MIRROR] $SOURCE_BRANCH -> $TARGET_BRANCH" \
            --body "PR espejo automático generado desde Azure DevOps. Esperando revisión de Bugbot antes del merge."