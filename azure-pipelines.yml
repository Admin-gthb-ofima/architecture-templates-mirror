trigger:
  branches:
    include:
      - "*"

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self
    persistCredentials: true
    fetchDepth: 0

  - script: |
      set -euo pipefail

      git config --global user.email "automation@ofima.com"
      git config --global user.name "Ofima Mirror Bot"

      GITHUB_URL="https://$(GITHUB_USER):$(GITHUB_PAT)@github.com/Admin-gthb-ofima/architecture-templates-mirror.git"

      if git remote get-url github >/dev/null 2>&1; then
        git remote set-url github "$GITHUB_URL"
      else
        git remote add github "$GITHUB_URL"
      fi

      git fetch origin --prune
      git push github +refs/remotes/origin/*:refs/heads/* --prune
      git push github --tags